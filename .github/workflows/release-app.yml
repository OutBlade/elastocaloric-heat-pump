name: Release EC-Lab

on:
  push:
    tags:
      - 'app-v*'

permissions:
  contents: write

jobs:
  build-and-publish:
    name: Build & publish Windows installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package.json

      # Derive semver from the git tag (app-v1.0.3 → 1.0.3) and write it
      # into package.json so the installer filename and latest.yml match the tag.
      - name: Sync version from tag
        shell: pwsh
        working-directory: app
        run: |
          $version = "${{ github.ref_name }}" -replace '^app-v', ''
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version = $version
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json -NoNewline
          Write-Output "Building version $version"

      - name: Install dependencies
        working-directory: app
        run: npm install

      - name: Rebuild native modules for Electron
        working-directory: app
        run: npx electron-rebuild -f -w serialport

      # electron-builder publishes directly to GitHub Releases.
      # It creates the release and uploads:
      #   ECLabSetup-x.y.z.exe
      #   ECLabSetup-x.y.z.exe.blockmap
      #   latest.yml          ← electron-updater reads this for auto-update
      - name: Build and publish to GitHub Releases
        working-directory: app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win -- --publish always
