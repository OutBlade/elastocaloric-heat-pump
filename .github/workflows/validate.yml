name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-validate:
    name: Lint & Data Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check analysis/

      - name: Validate experiment CSV files
        run: python analysis/validate_data.py

      - name: Execute analysis notebooks (if data present)
        run: |
          find analysis/notebooks -name "*.ipynb" | while read nb; do
            jupyter nbconvert --to notebook --execute "$nb" \
              --ExecutePreprocessor.timeout=120 2>/dev/null \
              && echo "OK: $nb" \
              || echo "SKIP (no data yet): $nb"
          done

  check-firmware:
    name: Firmware Syntax Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Initialize Arduino CLI
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Install required libraries
        run: |
          arduino-cli lib install "Adafruit MAX31855 library"
          arduino-cli lib install "HX711 Arduino Library"

      - name: Compile firmware
        run: |
          arduino-cli compile \
            --fqbn arduino:avr:mega \
            firmware/
